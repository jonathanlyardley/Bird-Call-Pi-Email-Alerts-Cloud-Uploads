name: Feature request
description: Suggest a practical improvement for monitoring, alerting, review, or upload safety.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What field-monitoring or maintenance problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: Describe the smallest useful version of the feature.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and privacy considerations
      description: Mention any risks around credentials, deletion, cloud uploads, raw audio, location data, or protected species records.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
